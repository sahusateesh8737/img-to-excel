<style>
        .spinner-border {
            border: 4px solid rgba(33, 115, 70, 0.2);
            border-left-color: #217346;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pulse-text {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body-lg min-h-screen flex flex-col items-center justify-center">
<!-- Transactional Screen - Suppress Shell Navigations -->
<main class="flex-1 w-full max-w-md mx-auto px-margin-mobile flex flex-col items-center justify-center relative">
<!-- Processing Content Canvas -->
<div class="flex flex-col items-center justify-center space-y-lg w-full">
<!-- Animated Spinner -->
<div class="relative flex items-center justify-center">
<div class="spinner-border"></div>
<!-- Subtle inner icon or graphic could go here, but prompt implies clean modern spinner -->
</div>
<!-- Processing Status Text -->
<div class="text-center space-y-sm">
<h1 class="font-headline-md text-headline-md text-primary">
                    AI is processing your image...
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant pulse-text">
                    Converting table to Excel format (5-15s)
                </p>
</div>
<!-- Fake Progress Bar -->
<div class="w-full bg-surface-container-high rounded-full h-2 mt-xl overflow-hidden relative">
<div class="bg-primary h-2 rounded-full absolute top-0 left-0 animate-[progress_10s_ease-in-out_infinite]" style="width: 0%"></div>
</div>
</div>
<!-- Tip at bottom -->
<div class="absolute bottom-xl w-full text-center px-margin-mobile">
<div class="inline-flex items-center space-x-sm bg-surface-container-low px-md py-sm rounded-lg border border-outline-variant shadow-sm">
<span class="material-symbols-outlined text-primary" data-icon="lightbulb" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
<p class="font-label-md text-label-md text-on-surface-variant">
                    Tip: Ensure the table is well-lit for best results.
                </p>
</div>
</div>
</main>
<style>
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 95%; } /* Doesn't reach 100% until actually done */
        }
    </style>
<script>
        // Simple script to handle icon rendering based on material-symbols-outlined rules
        document.addEventListener('DOMContentLoaded', () => {
            const icons = document.querySelectorAll('[data-icon]');
            icons.forEach(iconEl => {
                const iconName = iconEl.getAttribute('data-icon');
                if (iconName && !iconEl.textContent.trim()) {
                    iconEl.textContent = iconName;
                }
            });
        });
    </script>
